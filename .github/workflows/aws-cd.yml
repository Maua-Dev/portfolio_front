name: AWS CD
on:
  push:
    branches:
      - dev
      - homolog
      - prod
      - aws-migration
  workflow_dispatch:

jobs:
  DeployToAWS:
    environment:
      name: ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Determine AWS Account ID and Region
        run: |
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID_DEV }}" >> $GITHUB_ENV
            echo "AWS_REGION=us-east-1" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "homolog" ]]; then
            echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID_HOML }}" >> $GITHUB_ENV
            echo "AWS_REGION=us-east-1" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "prod" ]]; then
            echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID_PROD }}" >> $GITHUB_ENV
            echo "AWS_REGION=us-east-1" >> $GITHUB_ENV
          else
            echo "Invalid branch name!" && exit 1
          fi

      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          # cache: "npm"

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GithubActionsRole
          role-session-name: github-action-${{ github.run_id }}

      - name: Setting stage and stack name
        run: |
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "STAGE=dev" >> $GITHUB_ENV
            echo "ACM_CERTIFICATE_ARN=${{ secrets.DEV_ACM_DEVMAUA_CERTIFICATE_ARN }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "homolog" ]]; then
            echo "STAGE=homolog" >> $GITHUB_ENV
            echo "ACM_CERTIFICATE_ARN=${{ secrets.HML_ACM_DEVMAUA_CERTIFICATE_ARN }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "prod" ]]; then
            echo "STAGE=prod" >> $GITHUB_ENV
            echo "ACM_CERTIFICATE_ARN=${{ secrets.PROD_ACM_DEVMAUA_CERTIFICATE_ARN }}" >> $GITHUB_ENV
          else
            echo "Invalid branch name!" && exit 1
          fi
          echo "STACK_NAME=PortfolioStackFront${{env.STAGE}}" >> $GITHUB_ENV
          echo "ALTERNATIVE_DOMAIN_NAME=${{ vars.ALTERNATIVE_DOMAIN_NAME }}" >> $GITHUB_ENV
          echo "HOSTED_ZONE_ID=${{ secrets.HOSTED_ZONE_ID }}" >> $GITHUB_ENV
          echo "HOSTED_ZONE_NAME=${{ vars.HOSTED_ZONE_NAME }}" >> $GITHUB_ENV

      - name: Installing Dependencies
        run: |
          npm install
          npm install -g aws-cdk

      - name: Build and Export
        run: |
          npm run build

      - name: Setup envs
        run: |
          echo "Stage: ${{ env.STAGE }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "ACM Certificate: ${{ env.ACM_CERTIFICATE_ARN }}"

      - name: Deploy with CDK
        env:
          STAGE: ${{ env.STAGE }}
          ACM_CERTIFICATE_ARN: ${{ env.ACM_CERTIFICATE_ARN }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          cd iac
          npm install
          cdk synth
          cdk deploy --require-approval never

      - name: Set CloudFront ID
        run: |
          CLOUD_FRONT_ID=$(aws cloudformation --region ${{env.AWS_REGION}} describe-stacks --stack-name ${{env.STACK_NAME}} --query "Stacks[0].Outputs[?OutputKey=='PortfolioFrontDistributionId${{env.STAGE}}'].OutputValue" --output text)
          echo "CLOUD_FRONT_ID=$CLOUD_FRONT_ID" >> $GITHUB_ENV

      - name: Set AWS Bucket
        run: |
          AWS_BUCKET=$(aws cloudformation --region ${{env.AWS_REGION}} describe-stacks --stack-name ${{env.STACK_NAME}} --query "Stacks[0].Outputs[?OutputKey=='PortfolioFrontBucketName${{env.STAGE}}'].OutputValue" --output text)
          echo "AWS_BUCKET=$AWS_BUCKET" >> $GITHUB_ENV

      - name: Check if bucket exists
        run: |
          if [ -z "$AWS_BUCKET" ]; then 
            echo "Bucket name is empty!"
            exit 1
          fi
          aws s3 ls s3://$AWS_BUCKET || (echo "Bucket does not exist or is inaccessible" && exit 1)

      - name: Upload to S3
        run: |
          aws s3 cp dist s3://$AWS_BUCKET/ --recursive --region ${{ env.AWS_REGION }}

      - name: Clear CDN cache
        run: |
          if [ -n "$CLOUD_FRONT_ID" ]; then
            aws cloudfront create-invalidation --distribution-id $CLOUD_FRONT_ID --paths "/*" --region ${{ env.AWS_REGION }}
          else
            echo "CloudFront ID not found, skipping invalidation"
          fi
